server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Reads the json-file logs Docker already writes for every container in
  # this stack (see the `x-logging` anchor in docker-compose.yml), so no
  # application code needs to know Promtail exists.
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: stream
    pipeline_stages:
      - json:
          expressions:
            request_id: request_id
            level: level
            event: event
      - labels:
          request_id:
          level:
          event:
