worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # Basic request logging with a request-id so it lines up with the API's
    # own structured logs when both land in Loki.
    log_format main '$remote_addr - [$time_local] "$request" '
                     '$status $body_bytes_sent "$http_referer" '
                     'rid=$request_id';
    access_log /var/log/nginx/access.log main;

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

    server {
        listen 80;
        server_name _;
        # Redirect everything to TLS once a real cert is in place.
        # Comment this out for plain local HTTP testing.
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # ---- IoT API ----
        location /api/ {
            limit_req zone=api_limit burst=40 nodelay;
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
        }

        location /docs {
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
        }

        location /health {
            proxy_pass http://api:8000;
        }

        # ---- Grafana ----
        location /grafana/ {
            proxy_pass http://grafana:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
