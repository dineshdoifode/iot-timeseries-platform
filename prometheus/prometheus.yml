global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "iot-api"
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics

  - job_name: "iot-mqtt-worker"
    static_configs:
      - targets: ["mqtt-worker:9100"]

  - job_name: "iot-alarm-worker"
    static_configs:
      - targets: ["alarm-worker:9101"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
