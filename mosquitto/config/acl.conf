# Mosquitto ACL rules.
#
# This demo uses one shared service account (MQTT_USERNAME/MQTT_PASSWORD in
# .env) for the MQTT worker, alarm worker, API publisher, and simulator, so
# it gets broad access below. Before any real fleet rollout, replace this
# with per-device credentials and scope each device to its own
# phy/{device_id}/... namespace using the %u pattern substitution mosquitto
# supports (see commented pattern block).

user iot_service
topic readwrite phy/#
topic readwrite alarms/#
topic read $SYS/#

# Per-device credentials (real deployment) would instead look like:
# pattern write phy/%u/telemetry
# pattern write phy/%u/status
# pattern read  phy/%u/commands
