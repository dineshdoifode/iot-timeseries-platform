listener 1883
protocol mqtt

listener 9001
protocol websockets

persistence true
persistence_location /mosquitto/data/

log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# Password-based auth. The password file is generated by
# scripts/setup_mqtt_auth.sh (run once before `make up`, or via `make mqtt-auth`)
# and is a bind-mounted file, not baked into the image, so credentials never
# end up in a Docker layer.
allow_anonymous false
password_file /mosquitto/config/passwd
acl_file /mosquitto/config/acl.conf

max_keepalive 120
persistent_client_expiration 1d
